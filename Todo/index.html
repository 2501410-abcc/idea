<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>魔導書クエスト帳</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="book">



<h1>
<img src="img/title.png" alt="魔導書クエスト帳">
</h1>



<!-- ステータス -->

<div class="status">


<p id="level">
🌱 Lv.1 魔女見習い
</p>



<div class="exp-bar">

    <div class="exp" id="expBar"></div>

</div>



<p id="expText">
EXP 0 / 100
</p>


</div>





<h2>
魔導書クエスト
</h2>





<!-- クエスト追加 -->

<div class="add-area">



<select id="questType">


<option value="daily">
🌱 日課クエスト（+10EXP）
</option>


<option value="study">
📖 学習クエスト（+30EXP）
</option>


<option value="magic">
🪄 大魔法クエスト（+50EXP）
</option>



</select>





<input

type="text"

id="questInput"

placeholder="次の魔法任務を記録..."

>





<button id="addButton">

追加

</button>



</div>







<!-- クエスト一覧 -->

<ul

class="quest-list"

id="questList">

</ul>





</div>




<script src="Javascript.js"></script>



</body>

</html>
